<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="ljF_AsDCjE3XU5ed7CfSkbOnsGNCGmTofhVC1NPYO88" />
  <title>Create Your Account | Brajwasi's Coders</title>
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom CSS Styles -->
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/forms.css">
  <link rel="manifest" href="/manifest.json">
</head>
<body>

  <!-- Ambient Background Glow Orbs -->
  <div class="bg-glow-orb" style="top: 10%; left: 5%;"></div>
  <div class="bg-glow-orb gold" style="bottom: 10%; right: 5%;"></div>

  <!-- Back to Home -->
  <a href="/" class="back-to-home">
    <i class="fas fa-arrow-left"></i> Back To Home
  </a>

  <!-- Registration Portal -->
  <main class="auth-page">
    <div class="auth-container">
      <div class="auth-header">
        <a href="/" class="logo">
          <img src="/assets/brand/logo.png" alt="Brajwasi's Coders Logo">
          <span class="logo-text">Brajwasi's <span>Coders</span></span>
        </a>
        <h2>Join Our Ecosystem</h2>
        <p>Register to manage project pipelines and access your leads dashboard.</p>
      </div>

      <div class="glass-card auth-card">
        <!-- Error & Success Message Alerts -->
        <div id="auth-alert" style="display: none;"></div>

        <form class="auth-form" id="register-form">
          <!-- Full Name -->
          <div class="form-group">
            <label for="reg-name">Full Name</label>
            <div class="auth-input-wrapper">
              <input type="text" id="reg-name" class="auth-input" placeholder="e.g., Radhe Shyam" required>
              <i class="fas fa-user auth-input-icon"></i>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="reg-email">Email Address</label>
            <div class="auth-input-wrapper">
              <input type="email" id="reg-email" class="auth-input" placeholder="e.g., dev@example.com" required>
              <i class="fas fa-envelope auth-input-icon"></i>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="reg-password">Password</label>
            <div class="auth-input-wrapper">
              <input type="password" id="reg-password" class="auth-input" placeholder="Min. 6 characters" required minlength="6">
              <i class="fas fa-lock auth-input-icon"></i>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="gradient-btn btn-primary auth-btn">
            Create Account <i class="fas fa-user-plus" style="margin-left: 8px;"></i>
          </button>
        </form>

        <div class="auth-footer">
          Already registered? <a href="/login">Log In Here</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Auth Logic Javascript -->
  <script src="/scripts/config.js"></script>
  <script src="/scripts/auth.js"></script>
</body>
</html>
